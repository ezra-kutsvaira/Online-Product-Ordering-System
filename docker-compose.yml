services:
  db:
    image: mysql:8.4
    container_name: ops-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ops_db
      MYSQL_USER: ops_user
      MYSQL_PASSWORD: ops_password
    ports:
      - "3307:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: ops-app
    depends_on:
      - db
    environment:
      DB_URL: jdbc:mysql://db:3306/ops_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: ops_user
      DB_PASSWORD: ops_password
    ports:
      - "8080:8080"